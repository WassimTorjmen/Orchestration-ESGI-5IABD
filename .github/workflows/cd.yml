name: CD

# S19-1 : livraison sur main (après fusion PR validée par la CI) et sur les tags vX.Y.Z
on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Pas d'annulation en cours : on ne veut pas interrompre une livraison.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest
    # S19-2 : permission d'écriture sur GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # S19-3 : connexion à GHCR avec le jeton automatique
      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # S19-4 : calcul des tags (latest, sha, version sémantique)
      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mlproject-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      # S19-5 : build et push avec cache GHA
      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
