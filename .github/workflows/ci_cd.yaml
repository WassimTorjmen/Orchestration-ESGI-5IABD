name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHONPATH: src
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db
  MLFLOW_EXPERIMENT: titanic-survival
  MODEL_NAME: titanic-classifier

jobs:
  # ─────────────────────────────────────────
  # 1. Qualité du code
  # ─────────────────────────────────────────
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/mlproject

      - name: Ruff format check
        run: uv run ruff format --check src/mlproject

  # ─────────────────────────────────────────
  # 2. Vérification des types
  # ─────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Mypy
        run: uv run mypy src/mlproject

  # ─────────────────────────────────────────
  # 3. Tests
  # ─────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --cov=mlproject --cov-report=xml -q || test $? -eq 5

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ─────────────────────────────────────────
  # 4. Entraînement + porte qualité (même job → même mlflow.db)
  # ─────────────────────────────────────────
  train-and-evaluate:
    name: Train + Quality gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Train baseline
        run: uv run python -m mlproject.train --c 1.0 --max-iter 500

      - name: Evaluate & validate
        run: uv run python -m mlproject.evaluate

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          retention-days: 7
