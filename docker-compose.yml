# Stack complète - Titanic Classifier
# Seance 14 - Docker Compose
#
# Commandes (depuis la racine du projet) :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api frontend
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - /home/torjmen/Orchestration-ESGI-5IABD:/mlflow

  train:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models:ro
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.frontend
    environment:
      API_URL: http://api:8000
      MLFLOW_URL: http://mlflow:5000
      MLFLOW_PUBLIC_URL: ${MLFLOW_PUBLIC_URL:-http://localhost:5000}
      AIRFLOW_PUBLIC_URL: ${AIRFLOW_PUBLIC_URL:-http://localhost:8080}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mlflow_data:
  models_data:
